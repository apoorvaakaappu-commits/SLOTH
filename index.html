<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>🦥 SLOTH Embedded Builder</title>

<style>

body{
margin:0;
font-family:Consolas,monospace;
background:linear-gradient(270deg,#000,#002822,#000);
background-size:400% 400%;
animation:bg 12s infinite;
color:#00ffaa;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
text-align:center;
font-size:34px;
padding:20px;
border-bottom:2px solid #00ffaa;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:rgba(0,0,0,0.75);
border:1px solid #00ffaa;
border-radius:8px;
padding:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

select,input,textarea{
background:black;
color:#00ffaa;
border:1px solid #00ffaa;
padding:8px;
}

textarea{
width:100%;
height:350px;
}

button{
background:black;
color:#00ffaa;
border:1px solid #00ffaa;
padding:10px;
cursor:pointer;
margin-right:6px;
}

button:hover{
background:#00ffaa;
color:black;
}

li{
margin:6px;
}

</style>
</head>

<body>

<header>🦥 SLOTH Embedded Builder</header>

<div class="container">

<div class="card">

<h2>Firmware Builder</h2>

<div class="grid">

<div>
MCU Family<br>
<select id="family"></select>
</div>

<div>
MCU<br>
<select id="mcu"></select>
</div>

<div>
Search MCU<br>
<input id="search" placeholder="Search device">
</div>

<div>
Programming Language<br>
<select id="language">
<option>Arduino C++</option>
<option>C</option>
<option>MicroPython</option>
</select>
</div>

<div>
Component<br>
<select id="component"></select>
</div>

<div>
Function<br>
<select id="operation"></select>
</div>

<div>
Pin<br>
<select id="pin"></select>
</div>

</div>

<br>

<button id="add">Add Module</button>
<button id="generate">Generate Firmware</button>
<button id="download">Download</button>
<button id="clear">Clear</button>

<ul id="modules"></ul>

</div>

<div class="card">

<h2>Generated Firmware</h2>

<textarea id="code"></textarea>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const family=document.getElementById("family")
const mcu=document.getElementById("mcu")
const component=document.getElementById("component")
const operation=document.getElementById("operation")
const pin=document.getElementById("pin")
const modules=document.getElementById("modules")
const code=document.getElementById("code")
const search=document.getElementById("search")

/* =====================
MCU DATABASE
===================== */

const db={
Arduino:{mcus:["Uno","Nano","Mega","Leonardo","Due"]},
ESP:{mcus:["ESP8266","ESP32","ESP32S2","ESP32S3"]},
STM32:{mcus:[]},
AVR:{mcus:[]},
PIC:{mcus:[]},
NXP:{mcus:[]},
TI:{mcus:[]},
Nordic:{mcus:[]},
Renesas:{mcus:[]},
Infineon:{mcus:[]},
SiliconLabs:{mcus:[]},
GD32:{mcus:[]}
}

/* Generate many MCUs */

for(let i=0;i<200;i++){db.AVR.mcus.push("ATmega"+(100+i))}
for(let i=0;i<200;i++){db.PIC.mcus.push("PIC16F"+(800+i))}
for(let i=0;i<200;i++){db.PIC.mcus.push("PIC18F"+(2000+i))}
for(let i=0;i<300;i++){db.STM32.mcus.push("STM32F"+(100+i))}
for(let i=0;i<120;i++){db.NXP.mcus.push("LPC"+(1000+i))}
for(let i=0;i<120;i++){db.TI.mcus.push("MSP430"+(100+i))}
for(let i=0;i<120;i++){db.GD32.mcus.push("GD32F"+(100+i))}
for(let i=0;i<120;i++){db.SiliconLabs.mcus.push("EFM32"+(100+i))}
for(let i=0;i<120;i++){db.Infineon.mcus.push("XMC"+(100+i))}
for(let i=0;i<120;i++){db.Renesas.mcus.push("RA"+(100+i))}
for(let i=0;i<120;i++){db.Nordic.mcus.push("nRF52"+(800+i))}

/* Load families */

Object.keys(db).forEach(f=>{
let o=document.createElement("option")
o.textContent=f
family.appendChild(o)
})

function loadMCU(){

let fam=family.value
mcu.innerHTML=""

db[fam].mcus.forEach(chip=>{
let o=document.createElement("option")
o.textContent=chip
mcu.appendChild(o)
})

}

family.addEventListener("change",loadMCU)
loadMCU()

/* Search */

search.oninput=function(){

let text=search.value.toLowerCase()
let fam=family.value

mcu.innerHTML=""

db[fam].mcus.forEach(chip=>{
if(chip.toLowerCase().includes(text)){
let o=document.createElement("option")
o.textContent=chip
mcu.appendChild(o)
}
})

}

/* =====================
COMPONENTS
===================== */

const components=[
"LED","RGB LED","Relay","Buzzer","Servo",
"DC Motor","Stepper Motor","Motor Driver",
"OLED Display","LCD Display","TFT Display",
"Temperature Sensor","Humidity Sensor",
"Pressure Sensor","Gas Sensor","Light Sensor",
"Touch Sensor","Ultrasonic Sensor",
"IR Sensor","Hall Sensor",
"Accelerometer","Gyroscope","IMU",
"GPS","Bluetooth","WiFi","LoRa",
"SD Card","RTC Clock","Encoder",
"Camera","Microphone"
]

components.forEach(c=>{
let o=document.createElement("option")
o.textContent=c
component.appendChild(o)
})

/* =====================
FUNCTIONS
===================== */

const functions=[
"Digital Write","Digital Read","Analog Read","PWM Output",
"Toggle Output","UART Send","UART Receive",
"I2C Read","I2C Write","SPI Transfer",
"Interrupt Rising","Interrupt Falling",
"Timer Delay","Timer Interrupt",
"Servo Rotate","Motor Forward","Motor Reverse",
"Motor Stop","Stepper Step","Stepper Rotate",
"Sensor Read","Temperature Read","Humidity Read",
"Pressure Read","Ultrasonic Distance",
"GPS Read","WiFi Connect","WiFi Send Data",
"Bluetooth Send","Bluetooth Receive",
"SD Write","SD Read","RTC Time",
"Encoder Read","Camera Capture","Microphone Read"
]

functions.forEach(f=>{
let o=document.createElement("option")
o.textContent=f
operation.appendChild(o)
})

/* Pins */

for(let i=0;i<50;i++){
let o=document.createElement("option")
o.textContent=i
pin.appendChild(o)
}

/* =====================
MODULE STACK
===================== */

let stack=[]

document.getElementById("add").onclick=function(){

let m={
component:component.value,
func:operation.value,
pin:pin.value
}

stack.push(m)
render()

}

function render(){

modules.innerHTML=""

stack.forEach((m,i)=>{

let li=document.createElement("li")
li.textContent=`${m.component} -> ${m.func} on pin ${m.pin}`

let del=document.createElement("button")
del.textContent="X"

del.onclick=function(){
stack.splice(i,1)
render()
}

li.appendChild(del)
modules.appendChild(li)

})

}

/* =====================
GENERATE CODE
===================== */

document.getElementById("generate").onclick=function(){

let language=document.getElementById("language").value

if(language==="Arduino C++"){

let includes=""
let globals=""
let setup="void setup(){\n"
let loop="void loop(){\n"

stack.forEach((m,i)=>{

let p=m.pin

if(m.func==="Digital Write"){
setup+=` pinMode(${p},OUTPUT);\n`
loop+=` digitalWrite(${p},HIGH);\n`
}

if(m.func==="Digital Read"){
setup+=` pinMode(${p},INPUT);\n`
loop+=` int val${i}=digitalRead(${p});\n`
}

if(m.func==="Analog Read"){
loop+=` int val${i}=analogRead(${p});\n`
}

if(m.func==="PWM Output"){
setup+=` pinMode(${p},OUTPUT);\n`
loop+=` analogWrite(${p},128);\n`
}

if(m.func==="Servo Rotate"){
includes+="#include <Servo.h>\n"
globals+=`Servo servo${i};\n`
setup+=` servo${i}.attach(${p});\n`
loop+=` servo${i}.write(90);\n`
}

})

setup+="}\n\n"
loop+="delay(1000);\n}\n"

code.value=`${includes}\n${globals}\n${setup}${loop}`

}

/* MicroPython */

if(language==="MicroPython"){

let py="from machine import Pin\nimport time\n\n"

stack.forEach((m,i)=>{

if(m.func==="Digital Write"){
py+=`led${i}=Pin(${m.pin},Pin.OUT)\n`
py+=`led${i}.value(1)\n`
}

if(m.func==="Digital Read"){
py+=`btn${i}=Pin(${m.pin},Pin.IN)\n`
py+=`print(btn${i}.value())\n`
}

})

py+="\nwhile True:\n time.sleep(1)\n"

code.value=py

}

}

/* Download */

document.getElementById("download").onclick=function(){

let blob=new Blob([code.value],{type:"text/plain"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="sloth_firmware.ino"
a.click()

}

/* Clear */

document.getElementById("clear").onclick=function(){

stack=[]
modules.innerHTML=""
code.value=""

}

})

</script>

</body>
</html>
