<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SLOTH</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0a0a0a;
color:#00ff9c;
font-family:monospace;
margin:0;
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid #00ff9c;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

section{
border:1px solid #00ff9c;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #00ff9c;
}

textarea{
width:100%;
height:150px;
background:#111;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
}

input,select{
width:100%;
padding:8px;
background:#111;
color:#00ff9c;
border:1px solid #00ff9c;
margin-top:5px;
}

button{
margin-top:10px;
padding:10px;
background:#00ff9c;
border:none;
cursor:pointer;
}

.components{
display:flex;
gap:10px;
margin-top:10px;
}

.components div{
border:1px solid #00ff9c;
padding:8px;
cursor:grab;
}

#canvas{
border:2px dashed #00ff9c;
height:200px;
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
margin-top:10px;
}

#simulation{
font-size:30px;
margin-top:10px;
}

canvas{
background:#111;
}

</style>

</head>

<body>

<header>

<h1>🦥 SLOTH</h1>
<p>Real-Time AI Embedded Systems Platform</p>

</header>

<div class="container">

<section>

<h2>🔑 OpenAI API</h2>
<input id="apiKey" placeholder="Paste OpenAI API Key">

</section>

<section>

<h2>🤖 AI Firmware Generator</h2>

<select id="board">

<option>Arduino Uno</option>
<option>Arduino Nano</option>
<option>ESP32</option>
<option>ESP8266</option>
<option>STM32</option>
<option>Raspberry Pi Pico</option>

</select>

<select id="language">

<option>Arduino C++</option>
<option>MicroPython</option>
<option>C</option>
<option>CircuitPython</option>

</select>

<textarea id="description" placeholder="Describe your project..."></textarea>

<button onclick="generateFirmware()">Generate Firmware</button>

</section>

<section>

<h2>💻 Code Editor</h2>

<textarea id="code"></textarea>

<button onclick="debugCode()">AI Debug</button>

</section>

<section>

<h2>🧠 Real-Time AI Assistant</h2>

<textarea id="assistantInput" placeholder="Ask electronics questions..."></textarea>

<textarea id="assistantOutput"></textarea>

</section>

<section>

<h2>🔧 Circuit Builder</h2>

<div class="components">

<div draggable="true" ondragstart="drag(event)" id="led">💡 LED</div>
<div draggable="true" ondragstart="drag(event)" id="resistor">📏 Resistor</div>
<div draggable="true" ondragstart="drag(event)" id="button">🔘 Button</div>
<div draggable="true" ondragstart="drag(event)" id="sensor">🌡 Sensor</div>
<div draggable="true" ondragstart="drag(event)" id="wire">🧵 Wire</div>

</div>

<div id="canvas" ondrop="drop(event)" ondragover="allowDrop(event)">
Drop Components Here
</div>

<button onclick="simulate()">Run Simulation</button>

<div id="simulation"></div>

</section>

<section>

<h2>📡 Oscilloscope</h2>

<canvas id="wave"></canvas>

<button onclick="wave()">Generate Signal</button>

</section>

<section>

<h2>📐 Ohm's Law Calculator</h2>

<input id="v" placeholder="Voltage (V)">
<input id="i" placeholder="Current (I)">
<input id="r" placeholder="Resistance (Ω)">

<button onclick="ohm()">Calculate</button>

<p id="ohmResult"></p>

</section>

</div>

<script>

function allowDrop(ev){ev.preventDefault()}

function drag(ev){ev.dataTransfer.setData("text",ev.target.id)}

function drop(ev){
ev.preventDefault()
let data=ev.dataTransfer.getData("text")
ev.target.innerHTML+=" "+data
}

function simulate(){

let canvas=document.getElementById("canvas").innerHTML

if(canvas.includes("led")){
document.getElementById("simulation").innerHTML="💡 LED ON"
}
else{
document.getElementById("simulation").innerHTML="Simulation running"
}

}

function wave(){

let ctx=document.getElementById("wave")

let data=[]

for(let i=0;i<120;i++){
data.push(Math.sin(i/10))
}

new Chart(ctx,{
type:'line',
data:{
labels:data,
datasets:[{data:data}]
}
})

}

function ohm(){

let V=document.getElementById("v").value
let I=document.getElementById("i").value
let R=document.getElementById("r").value

let result=""

if(V && R) result="Current = "+(V/R)
else if(V && I) result="Resistance = "+(V/I)
else if(I && R) result="Voltage = "+(I*R)

document.getElementById("ohmResult").innerText=result

}

async function callAI(prompt){

let key=document.getElementById("apiKey").value

let response=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},

body:JSON.stringify({

model:"gpt-4.1-mini",

messages:[{role:"user",content:prompt}]

})

})

let data=await response.json()

return data.choices[0].message.content

}

async function generateFirmware(){

let desc=document.getElementById("description").value
let board=document.getElementById("board").value
let language=document.getElementById("language").value

let prompt=`Write firmware for ${board} using ${language}. Project: ${desc}. Return only code.`

let result=await callAI(prompt)

document.getElementById("code").value=result

}

async function debugCode(){

let code=document.getElementById("code").value

let prompt=`Debug this firmware:\n${code}`

let result=await callAI(prompt)

alert(result)

}

let timer=null

document.getElementById("assistantInput").addEventListener("input",function(){

clearTimeout(timer)

timer=setTimeout(async()=>{

let question=this.value

if(question.length<5) return

let prompt=`Answer this embedded systems question:\n${question}`

let result=await callAI(prompt)

document.getElementById("assistantOutput").value=result

},1200)

})

</script>

</body>
</html>
