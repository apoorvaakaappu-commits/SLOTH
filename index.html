<!DOCTYPE html>
<html>

<head>

<title>🦥 SLOTH PRO Offline Embedded Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0b0b0b;
color:#00ffa6;
font-family:Segoe UI,monospace;
margin:0;
}

header{
text-align:center;
font-size:30px;
padding:20px;
border-bottom:1px solid #00ffa6;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.panel{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #00ffa6;
}

textarea{
width:100%;
height:130px;
background:black;
color:#00ffa6;
border:1px solid #00ffa6;
}

select,input{
width:100%;
background:black;
color:#00ffa6;
border:1px solid #00ffa6;
margin-bottom:6px;
}

button{
background:#00ffa6;
border:none;
padding:8px;
margin-top:5px;
cursor:pointer;
}

.toolbox{
display:flex;
gap:10px;
margin-bottom:10px;
}

.component{
border:1px solid #00ffa6;
padding:6px;
cursor:grab;
}

canvas{
background:#080808;
border:1px solid #00ffa6;
}

</style>

</head>

<body>

<header>🦥 SLOTH PRO Offline Embedded Lab</header>

<div class="grid">

<div class="panel">

<h3>⚙ Firmware Generator</h3>

<select id="board">

<option>Arduino Uno</option>
<option>ESP32</option>
<option>Raspberry Pi Pico</option>
<option>STM32</option>

</select>

<select id="lang">

<option>C</option>
<option>C++</option>
<option>MicroPython</option>

</select>

<select id="template">

<option>Blink LED</option>
<option>Button LED Control</option>
<option>PWM LED Fade</option>

</select>

<button onclick="generate()">Generate Firmware</button>

<textarea id="editor"></textarea>

<button onclick="explain()">Explain Code</button>

</div>

<div class="panel">

<h3>🔧 Circuit Builder</h3>

<div class="toolbox">

<div class="component" draggable="true" data-type="led">💡 LED</div>
<div class="component" draggable="true" data-type="resistor">📏 Resistor</div>
<div class="component" draggable="true" data-type="button">🔘 Button</div>
<div class="component" draggable="true" data-type="battery">🔋 Battery</div>
<div class="component" draggable="true" data-type="wire">⚡ Wire</div>

</div>

<canvas id="boardCanvas" width="500" height="250"></canvas>

<button onclick="simulate()">Run Simulation</button>

</div>

<div class="panel">

<h3>📡 Oscilloscope</h3>

<canvas id="scope"></canvas>

<button onclick="sine()">Sine</button>
<button onclick="square()">Square</button>

</div>

<div class="panel">

<h3>📐 EEE Calculator</h3>

<input id="V" placeholder="Voltage">

<input id="I" placeholder="Current">

<input id="R" placeholder="Resistance">

<button onclick="ohm()">Ohm Law</button>

<div id="result"></div>

</div>

</div>

<script>

/* Firmware Generator */

function generate(){

let board=document.getElementById("board").value
let lang=document.getElementById("lang").value
let template=document.getElementById("template").value

let code=""

/* Blink */

if(template=="Blink LED"){

code=`// ${board} Blink LED

void setup(){
pinMode(13,OUTPUT);
}

void loop(){
digitalWrite(13,HIGH);
delay(1000);
digitalWrite(13,LOW);
delay(1000);
}`

}

/* Button */

if(template=="Button LED Control"){

code=`int button=2;
int led=13;

void setup(){
pinMode(button,INPUT);
pinMode(led,OUTPUT);
}

void loop(){

if(digitalRead(button)==HIGH)
digitalWrite(led,HIGH);

else
digitalWrite(led,LOW);

}`

}

/* PWM */

if(template=="PWM LED Fade"){

code=`int led=9;

void setup(){
pinMode(led,OUTPUT);
}

void loop(){

for(int i=0;i<255;i++){
analogWrite(led,i);
delay(10);
}

for(int i=255;i>0;i--){
analogWrite(led,i);
delay(10);
}

}`

}

document.getElementById("editor").value=code

}

function explain(){

alert("This firmware configures microcontroller pins and controls output signals using loops and digital instructions.")

}

/* Circuit Builder */

const canvas=document.getElementById("boardCanvas")
const ctx=canvas.getContext("2d")

const parts=[]

document.querySelectorAll(".component").forEach(c=>{
c.addEventListener("dragstart",e=>{
e.dataTransfer.setData("type",c.dataset.type)
})
})

canvas.addEventListener("dragover",e=>e.preventDefault())

canvas.addEventListener("drop",e=>{

const type=e.dataTransfer.getData("type")

parts.push({
type:type,
x:e.offsetX,
y:e.offsetY
})

draw()

})

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

parts.forEach(p=>{

ctx.fillStyle="#00ffa6"

if(p.type=="led"){
ctx.beginPath()
ctx.arc(p.x,p.y,8,0,Math.PI*2)
ctx.fill()
}

if(p.type=="resistor"){
ctx.strokeStyle="#00ffa6"
ctx.strokeRect(p.x-10,p.y-3,20,6)
}

if(p.type=="button"){
ctx.beginPath()
ctx.arc(p.x,p.y,8,0,Math.PI*2)
ctx.stroke()
}

if(p.type=="battery"){
ctx.fillRect(p.x-5,p.y-10,10,20)
}

if(p.type=="wire"){
ctx.strokeStyle="red"
ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(p.x+20,p.y)
ctx.stroke()
}

})

}

function simulate(){

ctx.fillStyle="#00ff00"

ctx.beginPath()
ctx.arc(250,120,40,0,Math.PI*2)

ctx.fill()

}

/* Oscilloscope */

function sine(){

const ctx2=document.getElementById("scope")

let data=[]

for(let i=0;i<100;i++)
data.push(Math.sin(i/10))

new Chart(ctx2,{
type:"line",
data:{labels:data.map((_,i)=>i),datasets:[{label:"Sine",data:data}]}
})

}

function square(){

const ctx2=document.getElementById("scope")

let data=[]

for(let i=0;i<100;i++)
data.push(i%20<10?1:-1)

new Chart(ctx2,{
type:"line",
data:{labels:data.map((_,i)=>i),datasets:[{label:"Square",data:data}]}
})

}

/* Calculator */

function ohm(){

let V=parseFloat(document.getElementById("V").value)
let I=parseFloat(document.getElementById("I").value)
let R=parseFloat(document.getElementById("R").value)

if(!R)R=V/I
if(!I)I=V/R
if(!V)V=I*R

document.getElementById("result").innerText="V="+V+" I="+I+" R="+R

}

</script>

</body>
</html>
