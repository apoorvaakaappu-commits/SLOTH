<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>🦥 SLOTH </title>

<style>

body{
margin:0;
background:#050505;
color:#00ffa6;
font-family:Consolas;
display:flex;
justify-content:center;
}

.container{
width:1000px;
padding:30px;
}

h1{
text-align:center;
font-size:40px;
}

.panel{
background:#0a0a0a;
border:1px solid #00ffa6;
padding:25px;
margin-top:20px;
}

select,button{
width:100%;
padding:12px;
margin-top:12px;
background:#111;
border:1px solid #00ffa6;
color:#00ffa6;
font-size:16px;
}

textarea{
width:100%;
height:260px;
margin-top:15px;
background:#030303;
color:#00ffa6;
border:1px solid #00ffa6;
}

button:hover{
background:#00ffa6;
color:black;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🦥 SLOTH Firmware Generator</h1>
<p align="center">⚡ Universal Embedded Code Builder ⚡</p>

<div class="panel">

<h3>📟 Microcontroller</h3>
<select id="mcu" onchange="updateLanguages()"></select>

<h3>💻 Programming Language</h3>
<select id="lang"></select>

<h3>🔌 Component</h3>
<select id="component"></select>

<h3>⚙ Function</h3>
<select id="func"></select>

<button onclick="generate()">🚀 Generate Firmware</button>

<textarea id="code"></textarea>

<button onclick="copyCode()">📋 Copy Code</button>

</div>

</div>

<script>

/* ---------------- MCU DATABASE ---------------- */

const mcuDB={

"Arduino Uno":{
languages:["Arduino C++"],
components:["LED","Button","Servo","Ultrasonic","LCD","Buzzer","Relay"],
functions:["Blink LED","Read Button","Servo Sweep","Display Text"]
},

"Arduino Mega":{
languages:["Arduino C++"],
components:["LED","Button","Servo","LCD","Stepper Motor"],
functions:["Blink LED","Stepper Control","Read Button"]
},

"ESP32":{
languages:["C++","Arduino","MicroPython"],
components:["LED","WiFi","Bluetooth","Servo","Ultrasonic","LCD"],
functions:["Blink LED","WiFi Scan","Servo Control","Distance Measure"]
},

"ESP8266":{
languages:["C++","Arduino","MicroPython"],
components:["LED","WiFi","Relay"],
functions:["Blink LED","WiFi WebServer"]
},

"Raspberry Pi Pico":{
languages:["C","MicroPython"],
components:["LED","Servo","Ultrasonic"],
functions:["Blink LED","Servo Sweep"]
},

"STM32":{
languages:["C","C++"],
components:["LED","UART","SPI","I2C","ADC"],
functions:["Blink LED","ADC Read"]
},

"ATmega328":{
languages:["C"],
components:["LED","Button","UART"],
functions:["Blink LED"]
},

"ATtiny85":{
languages:["C"],
components:["LED","Button"],
functions:["Blink LED"]
},

"PIC16F877A":{
languages:["C"],
components:["LED","LCD","ADC"],
functions:["Blink LED","ADC Read"]
},

"MSP430":{
languages:["C"],
components:["LED","Button","UART"],
functions:["Blink LED"]
},

"NXP LPC1768":{
languages:["C","C++"],
components:["LED","Ethernet","LCD"],
functions:["Blink LED"]
},

"Teensy 4.0":{
languages:["C++","Arduino"],
components:["LED","Audio","USB"],
functions:["Blink LED","Audio Output"]
}

}

/* ------------ Populate MCU List ------------ */

const mcuSelect=document.getElementById("mcu")

Object.keys(mcuDB).forEach(m=>{
let o=document.createElement("option")
o.text=m
mcuSelect.add(o)
})

updateLanguages()

/* --------- Update Language / Components ---------- */

function updateLanguages(){

let mcu=mcuSelect.value

let lang=document.getElementById("lang")
let comp=document.getElementById("component")
let func=document.getElementById("func")

lang.innerHTML=""
comp.innerHTML=""
func.innerHTML=""

mcuDB[mcu].languages.forEach(l=>{
let o=document.createElement("option")
o.text=l
lang.add(o)
})

mcuDB[mcu].components.forEach(c=>{
let o=document.createElement("option")
o.text=c
comp.add(o)
})

mcuDB[mcu].functions.forEach(f=>{
let o=document.createElement("option")
o.text=f
func.add(o)
})

}

/* ------------ Firmware Generator ------------ */

function generate(){

let mcu=document.getElementById("mcu").value
let lang=document.getElementById("lang").value
let comp=document.getElementById("component").value
let func=document.getElementById("func").value

let code=`// 🦥 Generated by SLOTH
// MCU: ${mcu}
// Language: ${lang}
// Component: ${comp}
// Function: ${func}

`

if(func=="Blink LED"){

code+=`
int led=13;

void setup(){
pinMode(led,OUTPUT);
}

void loop(){
digitalWrite(led,HIGH);
delay(1000);
digitalWrite(led,LOW);
delay(1000);
}
`

}

else if(func=="Servo Sweep"){

code+=`
#include <Servo.h>

Servo s;

void setup(){
s.attach(9);
}

void loop(){

for(int i=0;i<180;i++){
s.write(i);
delay(15);
}

for(int i=180;i>0;i--){
s.write(i);
delay(15);
}

}
`

}

else{

code+=`
void setup(){

}

void loop(){

}
`

}

document.getElementById("code").value=code

}

/* -------- Copy Code -------- */

function copyCode(){

let t=document.getElementById("code")

t.select()
document.execCommand("copy")

alert("📋 Firmware copied!")

}

</script>

</body>
</html>
